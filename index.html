<style>
:root{--bg:#fff;--bg2:#f5f4f0;--bg3:#eeecea;--text:#1a1a18;--t2:#6b6b67;--t3:#a0a09b;--bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--gn:#1D9E75;--rd:#E24B4A;--am:#BA7517;--bl:#378ADD;--pu:#7F77DD;--r:12px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#262624;--bg3:#302f2d;--text:#f0efe8;--t2:#9a9994;--t3:#6a6a65;--bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
header{padding:.875rem 1rem .5rem;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:10}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.hdr-title{font-size:18px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--t2)}
.hdr-right{display:flex;gap:6px;align-items:center}
.icon-btn{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:6px 11px;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit}
.sync-info{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gn);display:inline-block;flex-shrink:0}
.dot.err{background:var(--rd)}.dot.spin{background:var(--am)}
.month-row{display:flex;gap:8px;align-items:center}
.month-row select{flex:1;font-size:14px;padding:8px 10px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit}
.btn-sm{display:inline-block;padding:7px 14px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid var(--bd2);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit}
.tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto;white-space:nowrap}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{display:inline-block;padding:11px 15px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--text);border-bottom-color:var(--text)}
main{padding:1rem;max-width:680px;margin:0 auto;padding-bottom:3rem}
.sec{display:none}.sec.on{display:block}
.mg4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.875rem}
.mg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.875rem}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.875rem}
@media(max-width:480px){.mg4{grid-template-columns:1fr 1fr}}
.mc{background:var(--bg2);border-radius:var(--rs);padding:.75rem 1rem}
.mc-l{font-size:11px;color:var(--t2);margin-bottom:3px}
.mc-v{font-size:17px;font-weight:700}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:1rem 1.125rem;margin-bottom:.875rem}
.card-t{font-size:14px;font-weight:700;margin-bottom:.875rem}
.gn{color:var(--gn)!important}.rd{color:var(--rd)!important}.am{color:var(--am)!important}.pu{color:var(--pu)!important}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 .5rem;padding-bottom:.25rem;border-bottom:1px solid var(--bd)}
.slbl:first-child{margin-top:0}
.tx{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bd)}
.tx:last-child{border-bottom:none}
.ti{flex:1;min-width:0}
.td{font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tm{font-size:11px;color:var(--t3);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.ta{font-weight:700;font-size:14px;white-space:nowrap}
.xbtn{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;min-width:30px}
.xbtn:hover{color:var(--rd)}
.bdg{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.bh{background:#E6F1FB;color:#0C447C}.bl2{background:#FBEAF0;color:#72243E}
.b-sgb{background:#E1F5EE;color:#085041}.b-drs{background:#E6F1FB;color:#185FA5}
.b-tdd{background:#F1EFE8;color:#444441}.b-tdc{background:#FAEEDA;color:#633806}
.b-cxc{background:#EDE9FB;color:#3D35A3}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:.75rem}
.fg input,.fg select{font-size:14px;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit;width:100%}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--bl)}
.fg .full{grid-column:1/-1}
.add-btn{width:100%;padding:13px;border-radius:var(--r);border:none;background:var(--text);color:var(--bg);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:.875rem}
.catg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.875rem}
@media(min-width:500px){.catg{grid-template-columns:repeat(4,1fr)}}
.cb{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:.875rem;cursor:pointer}

<script>

const EMBED_KEY='$2a$10$wXhSK2fRxLl7wddOCX3PwuXXDimA1pIfbVA1jiUsZW8o8cCJWZ2dC';
const DK='drs_v6'; // mismo key para mantener datos existentes

const TABS=[['resumen','Resumen'],['cuentas','Cuentas TDD'],['inversiones','Inversiones'],['cobrar','x Cobrar'],['ingresos','Ingresos'],['presupuestos','Presupuestos'],['fijos','Gastos Fijos'],['tdc','TDC'],['empresas','Empresas'],['historial','Historial']];

const TDD_ACCTS=[

  {id:'tdb_lc',    defName:'TD Bank Conjunta',         who:'Lessys',biz:null,  linkedTDC:null},

  {id:'chase_sgb', defName:'Chase SGB',                who:'Lessys',biz:'SGB', linkedTDC:'tdc_ch_sgb'},

  {id:'amex_h',     defName:'Amex Hansel Personal',    who:'Hansel',lim:35000,biz:null,  linkedTDD:'bofa_h',    paidBy:'Hansel'},
  {id:'bofa_h_tdc', defName:'Bank of America Hansel',  who:'Hansel',lim:8000, biz:null,  linkedTDD:'bofa_h',    paidBy:'Hansel'},
  {id:'citi_h',     defName:'Citibank Hansel',         who:'Hansel',lim:6800, biz:null,  linkedTDD:'bofa_h',    paidBy:'Hansel'},
  {id:'capone_h',   defName:'Cap One Hansel Personal', who:'Hansel',lim:3300, biz:null,  linkedTDD:'bofa_h',    paidBy:'Hansel'},
  {id:'amex_l',     defName:'Amex Lessys Personal',    who:'Lessys',lim:12000,biz:null,  linkedTDD:'bofa_h',    paidBy:'Hansel'},
  {id:'capone_l',   defName:'Cap One Lessys Personal', who:'Lessys',lim:4000, biz:null,  linkedTDD:'bofa_h',    paidBy:'Hansel'},
  {id:'quick_l',    defName:'Quicksilver Lessys',      who:'Lessys',lim:300,  biz:null,  linkedTDD:'bofa_h',    paidBy:'Hansel'},
  {id:'tdc_ch_sgb', defName:'TDC Chase SGB',           who:'Lessys',lim:2000, biz:'SGB', linkedTDD:'chase_sgb', paidBy:'Lessys'},
  {id:'tdc_ax_sgb', defName:'TDC Amex SGB',            who:'Lessys',lim:10000,biz:'SGB', linkedTDD:'chase_sgb', paidBy:'Lessys'},
];
const INV_ACCTS=[
  {id:'ibkr',defName:'IBKR', icon:'📈',color:'#1F5CBA',sub:'Interactive Brokers'},
  {id:'rh',  defName:'RH',   icon:'🟢',color:'#21CE99',sub:'Robinhood'},
  {id:'bin', defName:'BIN',  icon:'🟡',color:'#F0B90B',sub:'Binance / Crypto'},
];
const DEF_FX=[
  {id:'a1',desc:'Arriendo (Hansel)',      amt:1456.99,ai:'bofa_h'},
  {id:'a2',desc:'Arriendo (Lessys/SGB)', amt:1456.99,ai:'chase_sgb'},
  {id:'f1',desc:'BJJ Santiago',          amt:185,    ai:'capone_h'},
  {id:'f2',desc:'Teléfonos e Internet',  amt:158.57, ai:'tdc_ch_sgb'},
  {id:'f3',desc:'LA Fitness',            amt:37.44,  ai:'amex_h'},
  {id:'f4',desc:'Seguro Autos',          amt:295,    ai:'bofa_h'},
  {id:'f5',desc:'Cuota Subaru',          amt:600,    ai:'chase_l'},
  {id:'f6',desc:'Supervisión BCBA',      amt:625,    ai:'tdc_ch_sgb'},
  {id:'f7',desc:'Seguro Marley',         amt:75,     ai:'tdb_l'},
  {id:'f8',desc:'Seguro Apto',           amt:14.55,  ai:'tdb_l'},
  {id:'f9',desc:'Netflix',              amt:9.04,   ai:'capone_h'},
  {id:'f10',desc:'Walmart Plus',         amt:12.95,  ai:'amex_h'},
  {id:'f11',desc:'Amazon Prime',         amt:16.23,  ai:'tdb_l'},
  {id:'f12',desc:'Spotify',             amt:22.62,  ai:'tdb_l'},
  {id:'f13',desc:'iCloud',              amt:9.99,   ai:'capone_h'},
  {id:'f14',desc:'Storytel',            amt:9.49,   ai:'capone_h'},
  {id:'f15',desc:'Claude AI',           amt:19.99,  ai:'capone_h'},
  {id:'f16',desc:'Microsoft 365',       amt:12.50,  ai:'capone_h'},
  {id:'f17',desc:'Mantenimiento Cond.', amt:10,     ai:'bofa_conj'},
];
const CATS={
  mercado:{lbl:'Mercado Casa',col:'#1D9E75'},gasolina:{lbl:'Gasolina',col:'#378ADD'},
  comidacalle:{lbl:'Comida Calle',col:'#BA7517'},personal:{lbl:'Personal H&L',col:'#D4537E'},
  colegio:{lbl:'Santiago Colegio',col:'#7F77DD'},improvistos:{lbl:'Imprevistos',col:'#E24B4A'},
  sunpass:{lbl:'SunPass',col:'#0F6E56'},ofrendas:{lbl:'Ofrendas',col:'#888780'},
};
const DEF_BGT={mercado:900,gasolina:400,comidacalle:400,personal:400,colegio:40,improvistos:400,sunpass:80,ofrendas:400};

function mkMo(){
  const fp={};DEF_FX.forEach(f=>{fp[f.id]=false;});
  const vg={};Object.keys(CATS).forEach(k=>{vg[k]=[];});
  const tddBal={};TDD_ACCTS.forEach(a=>{tddBal[a.id]=0;});
  const tdcAnt={};TDC_ACCTS.forEach(c=>{tdcAnt[c.id]=0;});
  const invBal={};INV_ACCTS.forEach(a=>{invBal[a.id]=0;});
  return{tddBal,ingresos:[],varGastos:vg,fixedPaid:fp,tdcPagos:[],tdcAnterior:tdcAnt,invBal,cxc:[]};
}
function defST(){
  const names={};
  [...TDD_ACCTS,...TDC_ACCTS,...INV_ACCTS].forEach(a=>{names[a.id]=a.defName;});
  return{cm:'2026-05',months:{'2026-05':mkMo()},fx:[...DEF_FX.map(f=>({...f}))],bgt:{...DEF_BGT},names};
}

let ST,curTab='resumen',selCat=null,editFx=null,pie=null,saveT=null;

// Migra datos viejos que usaban 'acctId' en vez de 'ai'
function migrateData(st){
  if(!st)return st;
  // Migrar ST.fx
  if(st.fx)st.fx.forEach(f=>{if(f.acctId&&!f.ai){f.ai=f.acctId;delete f.acctId;}});
  // Migrar transacciones en todos los meses
  if(st.months)Object.values(st.months).forEach(m=>{
    if(m.ingresos)m.ingresos.forEach(i=>{if(i.acctId&&!i.ai){i.ai=i.acctId;delete i.acctId;}});
    if(m.varGastos)Object.values(m.varGastos).forEach(list=>{list.forEach(t=>{if(t.acctId&&!t.ai){t.ai=t.acctId;delete t.acctId;}});});
    if(m.tdcPagos)m.tdcPagos.forEach(p=>{if(p.fromAcctId&&!p.fromAi){p.fromAi=p.fromAcctId;delete p.fromAcctId;}});
    if(m.cxc)m.cxc.forEach(c=>{if(c.acctId&&!c.ai){c.ai=c.acctId;delete c.acctId;}});
  });
  return st;
}
const CREDS={bin:EMBED_BIN,key:EMBED_KEY};

function cur(){
  if(!ST.months[ST.cm])ST.months[ST.cm]=mkMo();
  const m=ST.months[ST.cm];
  if(!m.tddBal){const b={};TDD_ACCTS.forEach(a=>{b[a.id]=0;});m.tddBal=b;}
  if(!m.tdcPagos)m.tdcPagos=[];
  if(!m.tdcAnterior){const b={};TDC_ACCTS.forEach(c=>{b[c.id]=0;});m.tdcAnterior=b;}
  if(!m.invBal){const b={};INV_ACCTS.forEach(a=>{b[a.id]=0;});m.invBal=b;}
  if(!m.cxc)m.cxc=[];
  if(!ST.names){ST.names={};[...TDD_ACCTS,...TDC_ACCTS,...INV_ACCTS].forEach(a=>{ST.names[a.id]=a.defName;});}
  return m;
}
function getName(id){if(ST&&ST.names&&ST.names[id])return ST.names[id];return[...TDD_ACCTS,...TDC_ACCTS,...INV_ACCTS].find(a=>a.id===id)?.defName||id;}

function $f(n){return'$'+(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(d){if(!d)return'';const p=d.split('-');return p[1]+'/'+p[2];}
function fdfull(d){if(!d)return'';const[y,m,day]=d.split('-');const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${ms[+m-1]} ${day}, ${y}`;}
function uid(){return'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function td(){return new Date().toISOString().split('T')[0];}
function mLbl(k){const[y,m]=k.split('-');return['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]+' '+y;}
function getAllAccts(){return[...TDD_ACCTS.map(a=>({...a,lbl:getName(a.id),t:'TDD'})),...TDC_ACCTS.map(a=>({...a,lbl:getName(a.id),t:'TDC'})),{id:'cash',lbl:'Efectivo',who:'Ambos',t:'Cash',biz:null}];}
function ac(id){return getAllAccts().find(a=>a.id===id)||{lbl:id||'—',who:'—',t:'?',biz:null};}
function bizOf(id){return ac(id).biz;}

// CALCULOS
function getAi(obj){return obj.ai||obj.acctId||null;}
function tddCalc(aid){
  const m=cur(),ini=Number(m.tddBal?.[aid]||0);
  const ing=(m.ingresos||[]).filter(i=>getAi(i)===aid).reduce((a,i)=>a+Number(i.amt),0);
  let gv=0;Object.values(m.varGastos||{}).forEach(list=>{list.forEach(t=>{if(getAi(t)===aid)gv+=Number(t.amt);});});
  let gf=0;ST.fx.forEach(f=>{if((f.ai||f.acctId)===aid&&m.fixedPaid[f.id])gf+=Number(f.amt);});
  const pTDC=(m.tdcPagos||[]).filter(p=>(p.fromAi||p.fromAcctId)===aid).reduce((a,p)=>a+Number(p.amt),0);
  return{ini,ing,gv,gf,pTDC,bal:ini+ing-gv-gf-pTDC};
}
function tdcCalc(tid){
  const m=cur(),ant=Number(m.tdcAnterior?.[tid]||0);
  let gv=0;Object.values(m.varGastos||{}).forEach(list=>{list.forEach(t=>{if(getAi(t)===tid)gv+=Number(t.amt);});});
  let gf=0;ST.fx.forEach(f=>{if((f.ai||f.acctId)===tid&&m.fixedPaid[f.id])gf+=Number(f.amt);});
  const pagos=(m.tdcPagos||[]).filter(p=>p.tdcId===tid).reduce((a,p)=>a+Number(p.amt),0);
  return{ant,gastado:gv+gf,pagos,bal:Math.max(0,ant+gv+gf-pagos)};
}
function cT(k){return(cur().varGastos[k]||[]).reduce((a,t)=>a+Number(t.amt),0);}
function tFx(){return ST.fx.reduce((a,f)=>a+f.amt,0);}
function tIng(){return cur().ingresos.reduce((a,i)=>a+Number(i.amt),0);}
function tVar(){return Object.keys(CATS).reduce((a,k)=>a+cT(k),0);}
function tTDD(){return TDD_ACCTS.reduce((a,x)=>a+tddCalc(x.id).bal,0);}
function tTDC(){return TDC_ACCTS.reduce((a,c)=>a+tdcCalc(c.id).bal,0);}
function tINV(){return INV_ACCTS.reduce((a,iv)=>a+Number(cur().invBal?.[iv.id]||0),0);}
function tCXC(){return(cur().cxc||[]).filter(c=>!c.cobrado).reduce((a,c)=>a+Number(c.amt),0);}

// SYNC
function setSync(st,txt){const d=document.getElementById('sDot'),t=document.getElementById('sTxt');if(d)d.className='dot'+(st==='ok'?'':st==='err'?' err':' spin');if(t)t.textContent=txt;}
async function cloudLoad(){
  setSync('spin','Cargando...');
  try{const r=await fetch('https://api.jsonbin.io/v3/b/'+CREDS.bin+'/latest',{headers:{'X-Master-Key':CREDS.key,'X-Bin-Meta':'false'}});
    if(r.ok){const d=await r.json();setSync('ok','Sincronizado ✓');return d.record||d;}
    setSync('err','Error');
  }catch(e){setSync('err','Sin internet');}
  return null;
}
async function cloudSave(){
  const data=JSON.stringify(ST);localStorage.setItem(DK,data);
  setSync('spin','Guardando...');
  try{const r=await fetch('https://api.jsonbin.io/v3/b/'+CREDS.bin,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':CREDS.key},body:data});
    if(r.ok)setSync('ok','Guardado ✓');else setSync('err','Error al guardar');
  }catch(e){setSync('err','Guardado local');}
}
function sv(){clearTimeout(saveT);saveT=setTimeout(cloudSave,1500);}
async function manualSync(){const d=await cloudLoad();if(d&&d.cm){ST=d;localStorage.setItem(DK,JSON.stringify(ST));renderAll();}}
async function init(){
  let local=null;try{const r=localStorage.getItem(DK);if(r)local=JSON.parse(r);}catch(e){}
  const cloud=await cloudLoad();
  ST=migrateData(cloud&&cloud.cm?cloud:(local&&local.cm?local:defST()));
  localStorage.setItem(DK,JSON.stringify(ST));
  // Save migrated data back to cloud so future loads are clean
  sv();
  renderAll();
}
function openCfg(){document.getElementById('c-bin').value=CREDS.bin;document.getElementById('c-key').value=CREDS.key;document.getElementById('cfgOv').style.display='flex';}
function closeCfg(){document.getElementById('cfgOv').style.display='none';}
function saveCfg(){CREDS.bin=document.getElementById('c-bin').value.trim();CREDS.key=document.getElementById('c-key').value.trim();closeCfg();manualSync();}

function initMSel(){document.getElementById('mSel').innerHTML=Object.keys(ST.months).sort().map(k=>`<option value="${k}"${k===ST.cm?' selected':''}>${mLbl(k)}</option>`).join('');}
function changeMonth(k){ST.cm=k;sv();selCat=null;editFx=null;renderAll();}
function addMonth(){
  const keys=Object.keys(ST.months).sort();let y=2026,m=5;
  if(keys.length){const[ly,lm]=keys[keys.length-1].split('-').map(Number);m=lm+1;y=ly;if(m>12){m=1;y++;}}
  const k=`${y}-${String(m).padStart(2,'0')}`;
  if(!ST.months[k])ST.months[k]=mkMo();
  ST.cm=k;sv();selCat=null;renderAll();
}
function initTabs(){document.getElementById('tabBar').innerHTML=TABS.map(([id,lbl])=>`<span class="tab${curTab===id?' on':''}" onclick="sw('${id}')">${lbl}</span>`).join('');}
function sw(t){curTab=t;selCat=null;editFx=null;initTabs();document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));const el=document.getElementById('sec-'+t);if(el)el.classList.add('on');rTab(t);}
function renderAll(){initTabs();initMSel();document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));const el=document.getElementById('sec-'+curTab);if(el)el.classList.add('on');rTab(curTab);}
function rTab(t){({resumen:rRes,cuentas:rCuentas,inversiones:rInv,cobrar:rCobrar,ingresos:rIng,presupuestos:rPres,fijos:rFijos,tdc:rTDC,empresas:rEmp,historial:rHistorial})[t]?.();}

function aOpts(sel){
  const A=getAllAccts();
  const G=[['Hansel TDD',A.filter(a=>a.who==='Hansel'&&a.t==='TDD')],['Hansel TDC',A.filter(a=>a.who==='Hansel'&&a.t==='TDC')],['Lessys TDD',A.filter(a=>a.who==='Lessys'&&a.t==='TDD')],['Lessys TDC',A.filter(a=>a.who==='Lessys'&&a.t==='TDC')],['Otro',A.filter(a=>a.t==='Cash')]];
  return G.map(([l,list])=>list.length?`<optgroup label="${l}">${list.map(a=>`<option value="${a.id}"${a.id===sel?' selected':''}>${a.lbl}${a.biz?' · '+a.biz:''}</option>`).join('')}</optgroup>`:'').join('');
}
function aSelect(sel,onch,sid='aSel'){return`<select id="${sid}" onchange="${onch||''}" style="font-family:inherit">${aOpts(sel)}</select>`;}
function bizBdg(b){if(b==='SGB')return`<span class="bdg b-sgb">SGB</span>`;if(b==='DRS')return`<span class="bdg b-drs">DRS</span>`;return'';}
function acBdg(id){const a=ac(id);return`<span class="bdg ${a.who==='Hansel'?'bh':'bl2'}">${a.who}</span> <span class="bdg ${a.t==='TDC'?'b-tdc':'b-tdd'}">${a.t}</span>${bizBdg(a.biz)}`;}

// RESUMEN
function rRes(){
  const tdd=tTDD(),tdc_=tTDC(),inv=tINV(),var_=tVar(),fij=tFx(),cxc=tCXC();
  const pat=tdd+inv-tdc_;
  let h=`<div class="mg4">
    <div class="mc"><div class="mc-l">Saldo TDD</div><div class="mc-v gn">${$f(tdd)}</div></div>
    <div class="mc"><div class="mc-l">Inversiones</div><div class="mc-v pu">${$f(inv)}</div></div>
    <div class="mc"><div class="mc-l">Deuda TDC</div><div class="mc-v rd">${$f(tdc_)}</div></div>
    <div class="mc"><div class="mc-l">Patrimonio neto</div><div class="mc-v ${pat>=0?'gn':'rd'}">${$f(pat)}</div></div>
  </div>
  <div class="mg3">
    <div class="mc"><div class="mc-l">Gastos fijos</div><div class="mc-v">${$f(fij)}</div></div>
    <div class="mc"><div class="mc-l">Gastos variables</div><div class="mc-v">${$f(var_)}</div></div>
    <div class="mc"><div class="mc-l">x Cobrar</div><div class="mc-v am">${$f(cxc)}</div></div>
  </div>`;
  const has=Object.keys(CATS).some(k=>cT(k)>0)||fij>0;
  h+=`<div class="card"><div class="card-t">Distribución de gastos</div>`;
  if(has)h+=`<div style="display:flex;justify-content:center;max-height:200px"><canvas id="pieC"></canvas></div>`;
  else h+=`<div class="empty">Agrega gastos para ver la gráfica</div>`;
  h+=`</div><div class="card"><div class="card-t">Presupuestos variables</div>`;
  Object.entries(CATS).forEach(([k,cat])=>{
    const real=cT(k),bgt=ST.bgt[k],pct=bgt>0?Math.min(real/bgt*100,100):0,ov=real>bgt;
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)">
      <div style="width:8px;height:8px;border-radius:50%;background:${cat.col};flex-shrink:0"></div>
      <div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${cat.lbl}</span><span style="font-weight:700;color:${ov?'var(--rd)':'var(--t2)'}">${$f(real)} / ${$f(bgt)}</span></div>
      <div class="prog"><div class="pf" style="width:${pct.toFixed(1)}%;background:${ov?'var(--rd)':cat.col}"></div></div></div>
      <span style="font-size:12px;font-weight:700;min-width:56px;text-align:right;color:${ov?'var(--rd)':'var(--gn)'}">${ov?'-':'+'}${$f(Math.abs(bgt-real))}</span>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('sec-resumen').innerHTML=h;
  if(has)bldPie();
}
function bldPie(){
  const L=[],D=[],C=[];
  Object.entries(CATS).forEach(([k,cat])=>{const v=cT(k);if(v>0){L.push(cat.lbl);D.push(+v.toFixed(2));C.push(cat.col);}});
  const tf=tFx();if(tf>0){L.push('Gastos Fijos');D.push(+tf.toFixed(2));C.push('#5F5E5A');}
  const cv=document.getElementById('pieC');if(!cv)return;
  if(pie){pie.destroy();pie=null;}
  pie=new Chart(cv,{type:'doughnut',data:{labels:L,datasets:[{data:D,backgroundColor:C,borderWidth:1,borderColor:'transparent'}]},options:{responsive:true,maintainAspectRatio:true,cutout:'58%',plugins:{legend:{position:'right',labels:{font:{size:11},padding:6,boxWidth:10}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${$f(ctx.raw)}`}}}}});
}

// CUENTAS TDD

  Object.entries(byWho).forEach(([who,list])=>{
    h+=`<div class="slbl">${who}</div>`;

              ${nm} ${a.biz?`<span class="bdg ${a.biz==='SGB'?'b-sgb':'b-drs'}">${a.biz}</span>`:''}
              ${linkedTDC?`<span class="link-badge">🔗 ${getName(linkedTDC.id)}</span>`:''}
            </div>
            <div style="font-size:11px;color:var(--t2);margin-top:2px">${who} · TDD</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:22px;font-weight:700;color:${balC}">${$f(c.bal)}</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.75rem">
          <span>🏦 Inicio: <strong>${$f(c.ini)}</strong></span>
          <span style="color:var(--gn)">↑ Ing: <strong>${$f(c.ing)}</strong></span>
          <span style="color:var(--rd)">↓ Gas: <strong>${$f(c.gv+c.gf)}</strong></span>
          <span style="color:var(--am)">💳 TDC: <strong>${$f(c.pTDC)}</strong></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><div style="font-size:11px;color:var(--t2);margin-bottom:4px">Nombre</div>
            <input type="text" value="${nm}" class="num-input" style="width:100%;font-size:13px" onchange="updName('${a.id}',this.value)"></div>

            <input type="number" value="${c.ini}" min="0" step="0.01" class="num-input" style="width:100%" onchange="updTDDBal('${a.id}',this.value)"></div>

function updTDDBal(id,v){if(!isNaN(+v)){cur().tddBal[id]=+v;sv();rCuentas();}}
function updName(id,v){if(!ST.names)ST.names={};if(v.trim())ST.names[id]=v.trim();sv();}

// CUENTAS POR COBRAR
function rCobrar(){
  const m=cur(),list=m.cxc||[];
  const pend=list.filter(c=>!c.cobrado),cobradas=list.filter(c=>c.cobrado);
  const totPend=pend.reduce((a,c)=>a+Number(c.amt),0);
  const today=td();
  function venceClass(d,cobrado){if(cobrado)return'';if(!d)return'';if(d<today)return'cxc-vence-over';if(d<=today.slice(0,7)+'-31')return'cxc-vence-warn';return'cxc-vence-ok';}
  function venceLbl(d,cobrado){if(cobrado)return'✓ Cobrado';if(!d)return'Sin fecha';if(d<today)return'⚠ Vencido: '+fdfull(d);return'Vence: '+fdfull(d);}
  let h=`<div class="mg2">
    <div class="mc"><div class="mc-l">Total por cobrar</div><div class="mc-v am">${$f(totPend)}</div></div>
    <div class="mc"><div class="mc-l">Préstamos activos</div><div class="mc-v">${pend.length}</div></div>
  </div>
  <div class="card"><div class="card-t">Nuevo préstamo / cuenta por cobrar</div>
  <div class="fg">
    <input type="text" id="cxc-quien" placeholder="Nombre del deudor..." class="full">
    <input type="text" id="cxc-desc" placeholder="Descripción (ej. Préstamo personal)" class="full">
    <input type="number" id="cxc-amt" placeholder="Monto $" min="0" step="0.01">
    <input type="date" id="cxc-fecha" value="${td()}" title="Fecha del préstamo">
    <input type="date" id="cxc-vence" title="Fecha esperada de cobro">
    ${aSelect('bofa_h','','cxc-acct')}
  </div>
  <button class="add-btn" onclick="addCXC()">+ Registrar préstamo</button></div>`;

  if(pend.length){
    h+=`<div class="slbl">Pendientes de cobro</div>`;
    pend.forEach(c=>{
      const vc=venceClass(c.vence,false),vl=venceLbl(c.vence,false);
      h+=`<div class="cxc-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
          <div>
            <div style="font-size:15px;font-weight:700">${c.quien}</div>
            <div style="font-size:13px;color:var(--t2);margin-top:2px">${c.desc}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:20px;font-weight:700;color:var(--am)">${$f(c.amt)}</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.75rem">
          <span>📅 Prestado: ${fdfull(c.fecha)}</span>
          <span class="${vc}">${vl}</span>
          <span>💳 Desde: ${ac(c.ai).lbl}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-sm" style="background:var(--gn);color:#fff;border-color:var(--gn)" onclick="markCXC('${c.id}',true)">✓ Marcar cobrado</button>
          <button class="btn-sm" onclick="delCXC('${c.id}')">× Eliminar</button>
        </div>
      </div>`;
    });
  }
  if(cobradas.length){
    h+=`<div class="slbl">Cobrados</div>`;
    cobradas.forEach(c=>{
      h+=`<div class="cxc-card cobrado">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:14px;font-weight:700">${c.quien} <span style="font-size:11px;color:var(--gn);font-weight:600">✓ Cobrado</span></div>
            <div style="font-size:12px;color:var(--t3)">${c.desc} · ${fdfull(c.fecha)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:16px;font-weight:700;color:var(--t3)">${$f(c.amt)}</div>
            <button class="xbtn" onclick="delCXC('${c.id}')">×</button>
          </div>
        </div>
      </div>`;
    });
  }
  if(!list.length)h+=`<div class="empty">Sin préstamos registrados</div>`;
  document.getElementById('sec-cobrar').innerHTML=h;
}
function addCXC(){
  const quien=document.getElementById('cxc-quien').value.trim(),desc=document.getElementById('cxc-desc').value.trim(),amt=parseFloat(document.getElementById('cxc-amt').value);
  if(!quien||!amt||amt<=0)return;
  if(!cur().cxc)cur().cxc=[];
  cur().cxc.push({id:uid(),quien,desc,amt,fecha:document.getElementById('cxc-fecha').value,vence:document.getElementById('cxc-vence').value||null,ai:document.getElementById('cxc-acct').value,cobrado:false});
  document.getElementById('cxc-quien').value='';document.getElementById('cxc-desc').value='';document.getElementById('cxc-amt').value='';document.getElementById('cxc-vence').value='';
  sv();rCobrar();
}
function markCXC(id,v){const c=(cur().cxc||[]).find(x=>x.id===id);if(c){c.cobrado=v;sv();rCobrar();}}
function delCXC(id){if(!confirm('¿Eliminar?'))return;cur().cxc=(cur().cxc||[]).filter(x=>x.id!==id);sv();rCobrar();}

// INGRESOS
function rIng(){
  const G={nomina:{lbl:'Nómina ITG — Hansel',list:[]},drs:{lbl:'Del Real Solutions — Hansel',list:[]},sgb:{lbl:'Smile Garden Behavior — Lessys',list:[]}};
  cur().ingresos.forEach(i=>{if(G[i.type])G[i.type].list.push(i);});
  let h=`<div class="card">
  <div class="info">Al registrar un ingreso, el saldo de la cuenta seleccionada sube automáticamente.</div>
  <div class="fg">
    <input type="date" id="iD" value="${td()}" class="full">
    <input type="text" id="iDesc" placeholder="Descripción (ej. Salario ITG)" class="full">
    <input type="number" id="iAmt" placeholder="Monto $" min="0" step="0.01">
    <select id="iType" style="font-family:inherit"><option value="nomina">Nómina ITG (Hansel)</option><option value="drs">Del Real Solutions</option><option value="sgb">Smile Garden Behavior</option></select>
    ${aSelect('bofa_h','')}
  </div>
  <button class="add-btn" onclick="addIng()">+ Registrar ingreso</button>
  <div class="info">Total ingresos del mes: <strong class="gn">${$f(tIng())}</strong></div>`;
  Object.entries(G).forEach(([type,g])=>{
    const sub=g.list.reduce((a,i)=>a+Number(i.amt),0);
    h+=`<div class="slbl">${g.lbl} <span style="font-weight:400;color:${sub>0?'var(--gn)':'var(--t3)'}">${$f(sub)}</span></div>`;
    if(!g.list.length)h+=`<div class="empty" style="padding:.75rem">Sin ingresos</div>`;
    else g.list.sort((a,b)=>a.date.localeCompare(b.date)).forEach(i=>{
      h+=`<div class="tx"><div class="ti"><div class="td">${i.desc}</div><div class="tm">${fd(i.date)} · ${ac(i.ai).lbl} ${acBdg(i.ai)}</div></div><div class="ta gn">+${$f(i.amt)}</div><button class="xbtn" onclick="delIng('${i.id}')">×</button></div>`;
    });
  });
  h+=`</div>`;
  document.getElementById('sec-ingresos').innerHTML=h;
}
function addIng(){
  const desc=document.getElementById('iDesc').value.trim(),amt=parseFloat(document.getElementById('iAmt').value);
  if(!desc||!amt||amt<=0)return;
  cur().ingresos.push({id:uid(),date:document.getElementById('iD').value,desc,amt,ai:document.getElementById('aSel').value,type:document.getElementById('iType').value});
  sv();rIng();
  setTimeout(()=>{const rs=document.getElementById('sec-resumen');if(rs&&rs.innerHTML)rRes();const ct=document.getElementById('sec-cuentas');if(ct&&ct.innerHTML)rCuentas();},50);
}
function delIng(id){if(!confirm('¿Eliminar?'))return;cur().ingresos=cur().ingresos.filter(i=>i.id!==id);sv();rIng();}

// PRESUPUESTOS

  let h=`<div class="catg">`;
  Object.entries(CATS).forEach(([k,cat])=>{
    const real=cT(k),bgt=ST.bgt[k],pct=bgt>0?Math.min(real/bgt*100,100):0,ov=real>bgt;
    h+=`<div class="cb${selCat===k?' sel':''}" onclick="sCat('${k}')"><div class="cn">${cat.lbl}</div>
      <div style="font-size:11px;color:${ov?'var(--rd)':'var(--t2)'};margin-bottom:2px">${Math.round(pct)}% — ${$f(real)}</div>
      <div class="prog"><div class="pf" style="width:${pct.toFixed(1)}%;background:${ov?'var(--rd)':cat.col}"></div></div>
      <div class="cnum"><span style="color:${ov?'var(--rd)':'var(--gn)'};font-weight:700">${ov?'-':'+'}${$f(Math.abs(bgt-real))}</span><span>${$f(bgt)}</span></div>
    </div>`;
  });
  h+=`</div>`;
  if(selCat){

      <div><div class="card-t" style="margin-bottom:2px">${cat.lbl}</div>
      <div style="font-size:12px;color:var(--t2)">Ppto: <input type="number" value="${ST.bgt[selCat]}" style="width:70px;font-size:12px;padding:4px 8px;border:1px solid var(--bd2);border-radius:6px;background:var(--bg);color:var(--text)" onchange="updBgt('${selCat}',this.value)"> / mes</div></div>
      <button class="xbtn" onclick="sCat(null)">×</button>
    </div>
    <div class="fg">
      <input type="date" id="eD" value="${td()}">
      <input type="text" id="eDesc" placeholder="Descripción..." class="full">
      <input type="number" id="eAmt" placeholder="Monto $" min="0" step="0.01">
      ${aSelect('amex_h','onAC()')}
      <span class="biz-hint" id="bizH">—</span>
    </div>
    <button class="add-btn" onclick="addExp()">+ Agregar gasto</button>
    ${items.length?items.map(t=>`<div class="tx"><div class="ti"><div class="td">${t.desc}</div><div class="tm">${fd(t.date)} · ${ac(t.ai).lbl} ${acBdg(t.ai)}</div></div><div class="ta rd">-${$f(t.amt)}</div><button class="xbtn" onclick="delExp('${selCat}','${t.id}')">×</button></div>`).join(''):`<div class="empty">Sin gastos</div>`}
    <div style="display:flex;justify-content:space-between;padding:10px 0 0;font-size:13px;font-weight:700;border-top:1px solid var(--bd2);margin-top:4px">
      <span>Total</span><span class="${cT(selCat)>ST.bgt[selCat]?'rd':'gn'}">${$f(cT(selCat))} / ${$f(ST.bgt[selCat])}</span>
    </div></div>`;
  }
  document.getElementById('sec-presupuestos').innerHTML=h;
}
function onAC(){const a=ac(document.getElementById('aSel')?.value);const h=document.getElementById('bizH');if(!h)return;if(a.t==='TDC')h.innerHTML=`<span class="bdg b-tdc">↑ Saldo TDC${a.biz?' · '+a.biz:''}</span>`;else if(a.biz)h.innerHTML=`<span class="bdg ${a.biz==='SGB'?'b-sgb':'b-drs'}">↓ ${a.biz} TDD</span>`;else h.textContent=`↓ TDD ${a.who}`;}
function sCat(k){selCat=k;rPres();}
function updBgt(k,v){if(!isNaN(+v)&&+v>0){ST.bgt[k]=+v;sv();rPres();}}
function addExp(){
  const desc=document.getElementById('eDesc')?.value.trim(),amt=parseFloat(document.getElementById('eAmt')?.value);
  if(!desc||!amt||amt<=0||!selCat)return;
  const ai=document.getElementById('aSel')?.value;
  if(!cur().varGastos[selCat])cur().varGastos[selCat]=[];
  cur().varGastos[selCat].push({id:uid(),date:document.getElementById('eD').value,desc,amt,ai,biz:bizOf(ai)});
  sv();rPres();
  setTimeout(()=>{const rs=document.getElementById('sec-resumen');if(rs&&rs.innerHTML)rRes();},50);
}
function delExp(cat,id){if(!confirm('¿Eliminar?'))return;cur().varGastos[cat]=cur().varGastos[cat].filter(t=>t.id!==id);sv();rPres();}

// GASTOS FIJOS
function rFijos(){
  const fp=cur().fixedPaid,tA=tFx(),tP=ST.fx.filter(f=>fp[f.id]).reduce((a,f)=>a+f.amt,0);
  const byW={Hansel:ST.fx.filter(f=>['Hansel'].includes(ac(f.ai||f.acctId).who)),Lessys:ST.fx.filter(f=>['Lessys'].includes(ac(f.ai||f.acctId).who))};
  let h=`<div class="mg3">
    <div class="mc"><div class="mc-l">Total fijos</div><div class="mc-v">${$f(tA)}</div></div>
    <div class="mc"><div class="mc-l">Pagados</div><div class="mc-v gn">${$f(tP)}</div></div>
    <div class="mc"><div class="mc-l">Pendiente</div><div class="mc-v rd">${$f(tA-tP)}</div></div>
  </div><div class="card">`;
  Object.entries(byW).forEach(([w,list])=>{
    if(!list.length)return;
    h+=`<div class="slbl">${w} — ${$f(list.reduce((a,f)=>a+f.amt,0))}</div>`;
    list.forEach(f=>{
      const pd=fp[f.id],a=ac(f.ai||f.acctId);
      if(editFx===f.id){
        h+=`<div class="erow"><input type="text" id="ef-d-${f.id}" value="${f.desc}" style="flex:1;min-width:100px"><input type="number" id="ef-a-${f.id}" value="${f.amt}" step="0.01" style="width:85px">${aSelect(f.ai,'','ef-s-'+f.id)}<button onclick="svFx('${f.id}')">Guardar</button><button onclick="cxFx()">Cancelar</button></div>`;
      }else{
        h+=`<div class="fi-row"><div class="fck${pd?' pd':''}" onclick="tgFx('${f.id}')">${pd?'✓':''}</div><div class="fn"><div style="font-size:14px">${f.desc}</div><div class="tm">${a.lbl} ${acBdg(f.ai)}</div></div><div style="font-weight:700;color:${pd?'var(--t3)':'var(--rd)'}">${$f(f.amt)}</div><button class="xbtn" style="font-size:16px" onclick="stFx('${f.id}')">✎</button><button class="xbtn" onclick="dlFx('${f.id}')">×</button></div>`;
      }
    });
  });
  h+=`<div class="slbl">Agregar gasto fijo</div>
  <div class="fg"><input type="text" id="nf-d" placeholder="Nombre del gasto..." class="full"><input type="number" id="nf-a" placeholder="Monto $" min="0" step="0.01">${aSelect('bofa_h','')}</div>
  <button class="add-btn" onclick="addFx()">+ Agregar gasto fijo</button></div>`;
  document.getElementById('sec-fijos').innerHTML=h;
}
function tgFx(id){
  cur().fixedPaid[id]=!cur().fixedPaid[id];
  sv();
  rFijos();
  // Refresh balances in other tabs if they were rendered
  setTimeout(()=>{
    const rs=document.getElementById('sec-resumen');
    const ct=document.getElementById('sec-cuentas');
    if(rs&&rs.innerHTML)rRes();
    if(ct&&ct.innerHTML)rCuentas();
  },50);
}
function stFx(id){editFx=id;rFijos();}
function cxFx(){editFx=null;rFijos();}
function svFx(id){
  const f=ST.fx.find(x=>x.id===id);if(!f)return;
  const d=document.getElementById('ef-d-'+id),a=document.getElementById('ef-a-'+id),s=document.getElementById('ef-s-'+id);
  if(d)f.desc=d.value.trim()||f.desc;if(a&&!isNaN(+a.value)&&+a.value>0)f.amt=+a.value;if(s)f.ai=s.value;
  editFx=null;sv();rFijos();
}
function dlFx(id){if(!confirm('¿Eliminar?'))return;ST.fx=ST.fx.filter(f=>f.id!==id);Object.values(ST.months).forEach(m=>{if(m.fixedPaid)delete m.fixedPaid[id];});sv();rFijos();}
function addFx(){
  const desc=document.getElementById('nf-d').value.trim(),amt=parseFloat(document.getElementById('nf-a').value);
  if(!desc||!amt||amt<=0)return;
  const ai=document.getElementById('aSel').value,nf={id:uid(),desc,amt,ai};
  ST.fx.push(nf);Object.values(ST.months).forEach(m=>{if(m.fixedPaid)m.fixedPaid[nf.id]=false;});
  document.getElementById('nf-d').value='';document.getElementById('nf-a').value='';sv();rFijos();
}

// TDC
function rTDC(){
  const totBal=tTDC(),totLim=TDC_ACCTS.reduce((a,c)=>a+c.lim,0);
  let h=`<div class="mg3">
    <div class="mc"><div class="mc-l">Deuda total TDC</div><div class="mc-v rd">${$f(totBal)}</div></div>
    <div class="mc"><div class="mc-l">Disponible total</div><div class="mc-v gn">${$f(totLim-totBal)}</div></div>
    <div class="mc"><div class="mc-l">Límite total</div><div class="mc-v">${$f(totLim)}</div></div>
  </div>
  <div class="info">El <strong>saldo anterior</strong> es la deuda que traes de meses pasados. Los gastos con esa tarjeta se suman automáticamente. Las tarjetas con 🔗 están vinculadas a una cuenta TDD para pagos.</div>`;

  const byWho={Hansel:TDC_ACCTS.filter(c=>c.who==='Hansel'),Lessys:TDC_ACCTS.filter(c=>c.who==='Lessys')};
  Object.entries(byWho).forEach(([who,list])=>{
    const sub=list.reduce((a,c)=>a+tdcCalc(c.id).bal,0);
    h+=`<div class="slbl">${who} — Deuda: <span style="color:var(--rd)">${$f(sub)}</span></div>`;
    list.forEach(c=>{
      const calc=tdcCalc(c.id),nm=getName(c.id),pct=c.lim>0?Math.min(calc.bal/c.lim*100,100):0;
      const linked=c.linkedTDD?TDD_ACCTS.find(a=>a.id===c.linkedTDD):null;
      h+=`<div class="tdc-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
          <div>
            <div style="font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              ${nm} ${bizBdg(c.biz)}
              ${linked?`<span class="link-badge">💡 Sugerido: ${getName(linked.id)}</span>`:''}
            </div>
            <div style="font-size:11px;color:var(--t2);margin-top:2px">Límite: ${$f(c.lim)} · Disp: ${$f(Math.max(0,c.lim-calc.bal))}</div>
          </div>
          <div style="text-align:right"><div style="font-size:22px;font-weight:700;color:var(--rd)">${$f(calc.bal)}</div><div style="font-size:11px;color:var(--t2)">Saldo actual</div></div>
        </div>
        <div class="prog"><div class="pf" style="width:${pct.toFixed(1)}%;background:${pct>80?'var(--rd)':pct>50?'var(--am)':'var(--gn)'}"></div></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:.75rem;font-size:11px;color:var(--t2)">
          <div><div style="margin-bottom:3px">Saldo anterior</div>
            <input type="number" value="${calc.ant}" min="0" step="0.01" class="num-input" style="width:100%" onchange="updTDCAnt('${c.id}',this.value)"></div>
          <div><div style="margin-bottom:3px">Gastado este mes</div>
            <div style="font-size:14px;font-weight:700;color:var(--rd);padding:7px 0">${$f(calc.gastado)}</div></div>
          <div><div style="margin-bottom:3px">Pagado este mes</div>
            <div style="font-size:14px;font-weight:700;color:var(--gn);padding:7px 0">${$f(calc.pagos)}</div></div>
        </div>
        <div style="margin-top:.625rem"><div style="font-size:11px;color:var(--t2);margin-bottom:4px">Nombre de la tarjeta</div>
          <input type="text" value="${nm}" class="num-input" style="width:100%;font-size:13px" onchange="updName('${c.id}',this.value)"></div>
      </div>`;
    });
  });

  h+=`<div class="card"><div class="card-t">Registrar pago de TDC</div>
  <div class="info">Al registrar el pago, el saldo de la TDC baja y el saldo de la cuenta TDD de origen también baja automáticamente.</div>
  <div class="fg">
    <input type="date" id="pD" value="${td()}">
    <select id="pTDC" style="font-family:inherit" onchange="updPagoFrom()">${TDC_ACCTS.map(c=>{const pb=c.paidBy==='Hansel'&&c.who==='Lessys'?' (Hansel paga)':'';return`<option value="${c.id}">${getName(c.id)}${pb}</option>`;}).join('')}</select>
    <input type="number" id="pAmt" placeholder="Monto pagado $" min="0" step="0.01">
    <select id="pFrom" style="font-family:inherit">
      <optgroup label="Hansel TDD">${TDD_ACCTS.filter(a=>a.who==='Hansel').map(a=>`<option value="${a.id}">${getName(a.id)}${a.biz?' · '+a.biz:''}</option>`).join('')}</optgroup>
      <optgroup label="Lessys TDD">${TDD_ACCTS.filter(a=>a.who==='Lessys').map(a=>`<option value="${a.id}">${getName(a.id)}${a.biz?' · '+a.biz:''}</option>`).join('')}</optgroup>
    </select>
  </div>
  <div id="pagoHint" style="margin-bottom:.75rem"><span style="font-size:12px;color:var(--t2)">💳 Se descuenta de: <strong>${getName(TDC_ACCTS[0].linkedTDD)}</strong></span></div>
  <button class="add-btn" id="pagoBtn" onclick="addPago()">+ Registrar pago</button>
  ${(cur().tdcPagos||[]).length?(cur().tdcPagos||[]).sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`<div class="tx"><div class="ti"><div class="td">Pago → ${getName(p.tdcId)}</div><div class="tm">${fd(p.date)} · Desde: ${ac(p.fromAi).lbl}</div></div><div class="ta gn">-${$f(p.amt)}</div><button class="xbtn" onclick="delPago('${p.id}')">×</button></div>`).join(''):''}
  </div>`;
  document.getElementById('sec-tdc').innerHTML=h;
}
function updPagoFrom(){
  const sel=document.getElementById('pTDC')?.value;
  const c=TDC_ACCTS.find(x=>x.id===sel);
  const fromSel=document.getElementById('pFrom');
  // Only pre-select the linked TDD as suggestion, user can change
  if(fromSel&&c&&c.linkedTDD)fromSel.value=c.linkedTDD;
  // Update hint
  const hint=document.getElementById('pagoHint');
  if(hint&&c){
    const fromVal=fromSel?.value;
    const fromNm=fromVal?getName(fromVal):'—';
    hint.innerHTML=`<span style="font-size:12px;color:var(--t2)">💳 Sugerido: <strong>${getName(c.linkedTDD||'bofa_h')}</strong> — puedes cambiar la cuenta arriba</span>`;
  }
}
function updTDCAnt(id,v){if(!isNaN(+v)){if(!cur().tdcAnterior)cur().tdcAnterior={};cur().tdcAnterior[id]=+v;sv();rTDC();}}
function addPago(){
  const amt=parseFloat(document.getElementById('pAmt').value);if(!amt||amt<=0)return;
  const tdcId=document.getElementById('pTDC').value,fromAi=document.getElementById('pFrom').value;
  if(!cur().tdcPagos)cur().tdcPagos=[];
  cur().tdcPagos.push({id:uid(),date:document.getElementById('pD').value,tdcId,fromAi,amt});
  document.getElementById('pAmt').value='';
  sv();
  rTDC();
  // Flash confirmation
  const btn=document.getElementById('pagoBtn');
  if(btn){const orig=btn.textContent;btn.textContent='✓ Pago registrado';btn.style.background='var(--gn)';setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2000);}
  // Actualizar saldos TDD y resumen inmediatamente
  setTimeout(()=>{
    const rs=document.getElementById('sec-resumen');
    const ct=document.getElementById('sec-cuentas');
    if(rs&&rs.innerHTML)rRes();
    if(ct&&ct.innerHTML)rCuentas();
  },50);
}
function delPago(id){
  if(!confirm('¿Eliminar pago?'))return;
  cur().tdcPagos=(cur().tdcPagos||[]).filter(p=>p.id!==id);
  sv();rTDC();
  setTimeout(()=>{
    const rs=document.getElementById('sec-resumen');
    const ct=document.getElementById('sec-cuentas');
    if(rs&&rs.innerHTML)rRes();
    if(ct&&ct.innerHTML)rCuentas();
  },50);
}

// EMPRESAS
function rEmp(){
  function bizExp(b){
    const l=[];Object.entries(cur().varGastos||{}).forEach(([cat,items])=>{items.forEach(t=>{if(t.biz===b)l.push({...t,cat});});});
    ST.fx.forEach(f=>{if(bizOf(f.ai||f.acctId)===b&&cur().fixedPaid[f.id])l.push({...f,cat:'fijo',biz:b});});return l;
  }
  function co(b,name,type,tddId){
    const ex=bizExp(b),inc=cur().ingresos.filter(i=>i.type===type);
    const tE=ex.reduce((a,t)=>a+Number(t.amt),0),tI=inc.reduce((a,t)=>a+Number(t.amt),0);
    // Include TDC payments made FROM the linked TDD account as business expenses
    const tdcPagosEmpresa=(cur().tdcPagos||[]).filter(p=>(p.fromAi||p.fromAcctId)===tddId).reduce((a,p)=>a+Number(p.amt),0);
    const net=tI-tE-tdcPagosEmpresa;
    const tddC=tddCalc(tddId),tddNm=getName(tddId);
    const tddBal=tddC.bal,tddBalC=tddBal>=0?'var(--gn)':'var(--rd)';
    return`<div class="co-card">
      <div class="co-hdr">
        <div>
          <div style="font-size:15px;font-weight:700">${name}</div>
          <div style="font-size:11px;color:var(--t2);margin-top:2px;display:flex;align-items:center;gap:6px">
            1099 · ${mLbl(ST.cm)}
            <span class="link-badge">🔗 ${tddNm}</span>
          </div>
        </div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--t2)">Neto del mes</div><div style="font-size:18px;font-weight:700;color:${net>=0?'var(--gn)':'var(--rd)'}">${$f(net)}</div></div>
      </div>
      <div class="co-body">
        <div style="background:var(--bg2);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:.875rem">
          <div style="font-size:11px;color:var(--t2);margin-bottom:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em">Cuenta vinculada — ${tddNm}</div>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:12px;color:var(--t2)">
            <div><div>Saldo actual</div><div style="font-size:18px;font-weight:700;color:${tddBalC}">${$f(tddBal)}</div></div>
            <div><div>Ingresos al mes</div><div style="font-size:16px;font-weight:700;color:var(--gn)">${$f(tddC.ing)}</div></div>
            <div><div>Gastos del mes</div><div style="font-size:16px;font-weight:700;color:var(--rd)">${$f(tddC.gv+tddC.gf)}</div></div>
            <div><div>Pagos TDC</div><div style="font-size:16px;font-weight:700;color:var(--am)">${$f(tddC.pTDC)}</div></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.875rem">
          <div class="mc"><div class="mc-l">Ingresos</div><div class="mc-v gn">${$f(tI)}</div></div>
          <div class="mc"><div class="mc-l">Gastos operativos</div><div class="mc-v rd">${$f(tE)}</div></div>
          <div class="mc"><div class="mc-l">Pagos TDC</div><div class="mc-v rd">${$f(tdcPagosEmpresa)}</div></div>
        </div>
        <div class="slbl">Ingresos</div>
        ${inc.length?inc.sort((a,b)=>a.date.localeCompare(b.date)).map(t=>`<div class="tx"><div class="ti"><div class="td">${t.desc}</div><div class="tm">${fd(t.date)} · ${ac(t.ai).lbl}</div></div><div class="ta gn">+${$f(t.amt)}</div></div>`).join(''):`<div class="empty" style="padding:.625rem">Agrega en "Ingresos" → "${type==='sgb'?'Smile Garden Behavior':'Del Real Solutions'}"</div>`}
        <div class="slbl" style="margin-top:1rem">Gastos</div>
        ${ex.length?ex.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(t=>`<div class="tx"><div class="ti"><div class="td">${t.desc}</div><div class="tm">${fd(t.date)} · ${ac(t.ai).lbl} · ${CATS[t.cat]?.lbl||'Fijo'}</div></div><div class="ta rd">-${$f(t.amt)}</div></div>`).join(''):`<div class="empty" style="padding:.625rem">Usa cuentas ${b} para enrutar gastos aquí</div>`}
        ${tdcPagosEmpresa>0?`<div class="slbl" style="margin-top:1rem">Pagos TDC desde ${getName(tddId)}</div>${(cur().tdcPagos||[]).filter(p=>(p.fromAi||p.fromAcctId)===tddId).sort((a,b)=>a.date.localeCompare(b.date)).map(p=>`<div class="tx"><div class="ti"><div class="td">Pago → ${getName(p.tdcId)}</div><div class="tm">${fd(p.date)}</div></div><div class="ta rd">-${$f(p.amt)}</div></div>`).join('')}`:''}
      </div></div>`;
  }
  document.getElementById('sec-empresas').innerHTML=
    `<div class="info">Cada empresa muestra el saldo en tiempo real de su cuenta TDD vinculada, más los ingresos y gastos del mes.</div>`+
    co('SGB','Smile Garden Behavior','sgb','chase_sgb')+
    co('DRS','Del Real Solutions','drs','chase_drs');
}

// ── HISTORIAL MENSUAL ─────────────────────────────────────────────────────────
function rHistorial(){
  const months=Object.keys(ST.months).sort().reverse();
  if(months.length<=1&&months[0]===ST.cm){
    document.getElementById('sec-historial').innerHTML=`<div class="empty" style="padding:2rem">Aún no hay meses cerrados. El historial aparece aquí cuando avances al siguiente mes.</div>`;
    return;
  }
  let h=`<div class="info">Resumen de todos los meses registrados. El mes activo se muestra al final.</div>`;
  months.forEach(k=>{
    const m=ST.months[k];if(!m)return;
    const isActive=k===ST.cm;
    const ing=m.ingresos?m.ingresos.reduce((a,i)=>a+Number(i.amt),0):0;
    let var_=0;Object.keys(CATS).forEach(cat=>{var_+=(m.varGastos?.[cat]||[]).reduce((a,t)=>a+Number(t.amt),0);});
    const fij=ST.fx.reduce((a,f)=>a+f.amt,0);
    const totalTDC=TDC_ACCTS.reduce((a,c)=>{
      const ant=Number(m.tdcAnterior?.[c.id]||0);
      let gv=0;Object.values(m.varGastos||{}).forEach(list=>{list.forEach(t=>{if(t.ai===c.id)gv+=Number(t.amt);});});
      let gf=0;ST.fx.forEach(f=>{if(f.ai===c.id&&m.fixedPaid?.[f.id])gf+=Number(f.amt);});
      const pagos=(m.tdcPagos||[]).filter(p=>p.tdcId===c.id).reduce((a,p)=>a+Number(p.amt),0);
      return a+Math.max(0,ant+gv+gf-pagos);
    },0);
    const tddTotal=TDD_ACCTS.reduce((a,ac)=>{
      const ini=Number(m.tddBal?.[ac.id]||0);
      const ing2=(m.ingresos||[]).filter(i=>i.ai===ac.id).reduce((a,i)=>a+Number(i.amt),0);
      let gv=0;Object.values(m.varGastos||{}).forEach(list=>{list.forEach(t=>{if(t.ai===ac.id)gv+=Number(t.amt);});});
      let gf=0;ST.fx.forEach(f=>{if(f.ai===ac.id&&m.fixedPaid?.[f.id])gf+=Number(f.amt);});
      const pTDC=(m.tdcPagos||[]).filter(p=>p.fromAi===ac.id).reduce((a,p)=>a+Number(p.amt),0);
      return a+(ini+ing2-gv-gf-pTDC);
    },0);
    const invTotal=INV_ACCTS.reduce((a,iv)=>a+Number(m.invBal?.[iv.id]||0),0);
    const pat=tddTotal+invTotal-totalTDC;
    h+=`<div class="card" style="${isActive?'border-color:var(--bl);border-width:1.5px':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
        <div>
          <div style="font-size:16px;font-weight:700">${mLbl(k)}</div>
          ${isActive?'<span class="bdg b-drs">Mes activo</span>':''}
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--t2)">Patrimonio neto</div>
          <div style="font-size:18px;font-weight:700;color:${pat>=0?'var(--gn)':'var(--rd)'}">${$f(pat)}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.875rem">
        <div class="mc"><div class="mc-l">Ingresos</div><div class="mc-v gn">${$f(ing)}</div></div>
        <div class="mc"><div class="mc-l">Gastos variables</div><div class="mc-v rd">${$f(var_)}</div></div>
        <div class="mc"><div class="mc-l">Gastos fijos</div><div class="mc-v">${$f(fij)}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.875rem">
        <div class="mc"><div class="mc-l">Saldo TDD</div><div class="mc-v ${tddTotal>=0?'gn':'rd'}">${$f(tddTotal)}</div></div>
        <div class="mc"><div class="mc-l">Deuda TDC</div><div class="mc-v rd">${$f(totalTDC)}</div></div>
        <div class="mc"><div class="mc-l">Inversiones</div><div class="mc-v pu">${$f(invTotal)}</div></div>
      </div>
      <div class="slbl" style="margin-top:.5rem">Detalle por presupuesto</div>
      ${Object.entries(CATS).map(([ck,cat])=>{
        const real=(m.varGastos?.[ck]||[]).reduce((a,t)=>a+Number(t.amt),0);
        const bgt=ST.bgt[ck],pct=bgt>0?Math.min(real/bgt*100,100):0,ov=real>bgt;
        if(real===0)return'';
        return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--bd);font-size:13px">
          <div style="width:7px;height:7px;border-radius:50%;background:${cat.col};flex-shrink:0"></div>
          <div style="flex:1">${cat.lbl}</div>
          <div style="font-weight:600;color:${ov?'var(--rd)':'var(--text)'}">${$f(real)}</div>
          <div style="font-size:11px;color:${ov?'var(--rd)':'var(--t2)'}">/ ${$f(bgt)}</div>
          <div style="width:60px"><div class="prog"><div class="pf" style="width:${pct.toFixed(0)}%;background:${ov?'var(--rd)':cat.col}"></div></div></div>
        </div>`;
      }).join('')}
      ${!isActive?`<div style="margin-top:.875rem">
        <button class="btn-sm" style="font-size:12px" onclick="exportMonth('${k}')">📄 Exportar resumen</button>
      </div>`:''}
    </div>`;
  });
  document.getElementById('sec-historial').innerHTML=h;
}

function exportMonth(k){
  const m=ST.months[k];if(!m)return;
  const ing=(m.ingresos||[]).reduce((a,i)=>a+Number(i.amt),0);
  let lines=[`RESUMEN FINANCIERO — ${mLbl(k)}`,'='.repeat(40),''];
  lines.push(`INGRESOS TOTALES: ${$f(ing)}`,'');
  lines.push('PRESUPUESTOS VARIABLES:');
  Object.entries(CATS).forEach(([ck,cat])=>{
    const real=(m.varGastos?.[ck]||[]).reduce((a,t)=>a+Number(t.amt),0);
    if(real>0)lines.push(`  ${cat.lbl}: ${$f(real)} / ${$f(ST.bgt[ck])}`);
  });
  lines.push('','GASTOS FIJOS: '+$f(ST.fx.reduce((a,f)=>a+f.amt,0)));
  lines.push('','INGRESOS POR FUENTE:');
  const byType={nomina:'Nómina ITG',drs:'Del Real Solutions',sgb:'Smile Garden Behavior'};
  Object.entries(byType).forEach(([t,lbl])=>{
    const sub=(m.ingresos||[]).filter(i=>i.type===t).reduce((a,i)=>a+Number(i.amt),0);
    if(sub>0)lines.push(`  ${lbl}: ${$f(sub)}`);
  });
  const txt=lines.join('\n');
  const blob=new Blob([txt],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`resumen_${k}.txt`;a.click();
  URL.revokeObjectURL(url);
}

init();
</script>
